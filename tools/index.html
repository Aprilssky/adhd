<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工具箱 · ADHD 专注小岛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f6fb;
      --card: #ffffff;
      --primary: #7c6fa0;
      --primary-light: #a695c6;
      --primary-dark: #5a4d7a;
      --accent: #e8a87c;
      --accent-light: #f5d4b8;
      --text: #3d3352;
      --text-soft: #7a6f8a;
      --text-muted: #a99fba;
      --border: #e8e3ee;
      --shadow: 0 2px 16px rgba(124, 111, 160, 0.08);
      --radius: 16px;
      --radius-sm: 10px;
      --transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Nav ── */
    .top-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding: 14px 20px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
    }
    .top-nav a {
      text-decoration: none;
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 500;
      padding: 6px 20px;
      border-radius: 50px;
      transition: var(--transition);
    }
    .top-nav a:hover { background: var(--bg); color: var(--primary-dark); }
    .top-nav a.active {
      background: var(--primary);
      color: #fff;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 40px 20px 24px;
      background: linear-gradient(145deg, #f0ebf7 0%, #f8f6fb 100%);
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary-dark);
      letter-spacing: -0.5px;
    }
    header h1 span { color: var(--accent); }
    header p {
      color: var(--text-soft);
      font-size: 15px;
      margin-top: 6px;
      font-weight: 400;
    }

    /* ── Layout ── */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 60px;
      display: grid;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 28px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(124, 111, 160, 0.12);
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--primary-dark);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .icon { font-size: 20px; }

    /* ── Grid ── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* ── Pomodoro ── */
    .pomodoro-display {
      font-size: 56px;
      font-weight: 700;
      text-align: center;
      color: var(--primary-dark);
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      margin: 8px 0 4px;
    }
    .pomodoro-phase {
      text-align: center;
      font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 16px;
    }
    .pomodoro-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pomodoro-btn {
      border: none;
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .pomodoro-btn.primary {
      background: var(--primary);
      color: #fff;
    }
    .pomodoro-btn.primary:hover {
      background: var(--primary-dark);
      transform: scale(1.04);
    }
    .pomodoro-btn.primary.active {
      background: var(--accent);
    }
    .pomodoro-btn.secondary {
      background: var(--border);
      color: var(--text-soft);
    }
    .pomodoro-btn.secondary:hover {
      background: #dcd5e6;
    }
    .pomodoro-btn.secondary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Todo ── */
    .todo-input-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .todo-input-wrap input {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .todo-input-wrap input:focus {
      border-color: var(--primary-light);
    }
    .todo-input-wrap input::placeholder {
      color: var(--text-muted);
    }
    .todo-add-btn {
      border: none;
      background: var(--primary);
      color: #fff;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .todo-add-btn:hover { background: var(--primary-dark); }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      transition: background 0.2s;
    }
    .todo-item:hover { background: #f0ebf7; }
    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
      flex-shrink: 0;
    }
    .todo-item label {
      flex: 1;
      font-size: 14px;
      cursor: pointer;
      word-break: break-word;
    }
    .todo-item label.done {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    .todo-item .del-btn {
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0 4px;
      transition: color 0.2s;
    }
    .todo-item .del-btn:hover { color: #e07070; }

    .todo-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      padding: 20px 0;
    }

    /* ── Quick Note ── */
    .note-area {
      width: 100%;
      min-height: 90px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    .note-area:focus {
      border-color: var(--primary-light);
    }
    .note-area::placeholder {
      color: var(--text-muted);
    }

    /* ── Quote ── */
    .quote-box {
      text-align: center;
      padding: 4px 0;
    }
    .quote-text {
      font-size: 16px;
      font-weight: 400;
      color: var(--text-soft);
      font-style: italic;
      line-height: 1.7;
    }
    .quote-text::before { content: '\201C'; }
    .quote-text::after { content: '\201D'; }

    /* ── Mood / Focus tracker ── */
    .mood-grid {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 6px;
    }
    .mood-btn {
      border: 2px solid var(--border);
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 22px;
      cursor: pointer;
      transition: var(--transition);
    }
    .mood-btn:hover, .mood-btn.active {
      border-color: var(--primary-light);
      background: #f0ebf7;
      transform: scale(1.1);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 13px;
    }
    footer a { color: var(--primary-light); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .grid-2 { grid-template-columns: 1fr; }
      header h1 { font-size: 24px; }
      .pomodoro-display { font-size: 44px; }
      .card { padding: 20px; }
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeUp 0.5s ease both; }
    .card:nth-child(2) { animation-delay: 0.08s; }
    .card:nth-child(3) { animation-delay: 0.16s; }
    .card:nth-child(4) { animation-delay: 0.24s; }
    .card:nth-child(5) { animation-delay: 0.32s; }

    /* ── Breathe helper ── */
    .breathe-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 10px auto;
      background: conic-gradient(var(--primary-light) 0deg, var(--accent-light) 180deg, var(--primary-light) 360deg);
      transition: transform 4s ease-in-out;
    }
    .breathe-circle.inhale {
      transform: scale(1);
      animation: breatheIn 4s ease-in-out forwards;
    }
    .breathe-circle.exhale {
      transform: scale(0.6);
      animation: breatheOut 4s ease-in-out forwards;
    }
    @keyframes breatheIn {
      0%   { transform: scale(0.6); opacity: 0.7; }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes breatheOut {
      0%   { transform: scale(1);   opacity: 1; }
      100% { transform: scale(0.6); opacity: 0.7; }
    }
    .breathe-label {
      text-align: center;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-soft);
      margin-top: 4px;
    }
    .breathe-btn {
      display: block;
      margin: 10px auto 0;
      border: none;
      background: var(--primary);
      color: #fff;
      padding: 8px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .breathe-btn:hover { background: var(--primary-dark); }
    .breathe-btn.active { background: var(--accent); }

    /* local save feedback */
    .save-hint {
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .save-hint.show { opacity: 1; }
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="../">🏠 首页</a>
  <a href="./" class="active">🧰 工具箱</a>
  <a href="../adhders/">⭐ ADHDer</a>
</nav>

<header>
  <h1>🧰 <span>专注小岛</span> · 工具箱</h1>
  <p>帮你找回节奏的小工具</p>
</header>

<div class="container">

  <!-- Pomodoro -->
  <div class="card">
    <div class="card-title"><span class="icon">🍅</span> 番茄时钟</div>
    <div class="pomodoro-display" id="pomodoroDisplay">25:00</div>
    <div class="pomodoro-phase" id="pomodoroPhase">专注时间</div>
    <div class="pomodoro-controls">
      <button class="pomodoro-btn primary" id="pomodoroToggle">开始</button>
      <button class="pomodoro-btn secondary" id="pomodoroReset">重置</button>
    </div>
  </div>

  <!-- Grid: Todo + Notes -->
  <div class="grid-2">
    <!-- Todo -->
    <div class="card">
      <div class="card-title"><span class="icon">✅</span> 待办清单</div>
      <div class="todo-input-wrap">
        <input type="text" id="todoInput" placeholder="写点想做的事…" maxlength="120">
        <button class="todo-add-btn" id="todoAdd">添加</button>
      </div>
      <ul class="todo-list" id="todoList">
        <div class="todo-empty" id="todoEmpty">✨ 清单空空，加个任务吧</div>
      </ul>
      <div class="save-hint" id="todoSaveHint">已自动保存</div>
    </div>

    <!-- Quick Note -->
    <div class="card">
      <div class="card-title"><span class="icon">📝</span> 随手记</div>
      <textarea class="note-area" id="noteArea" placeholder="突然想到什么？记下来…" maxlength="2000"></textarea>
      <div class="save-hint" id="noteSaveHint">已自动保存</div>
    </div>
  </div>

  <!-- Breathing -->
  <div class="card">
    <div class="card-title"><span class="icon">🫁</span> 呼吸练习</div>
    <div class="breathe-circle" id="breatheCircle"></div>
    <div class="breathe-label" id="breatheLabel">按下方按钮开始</div>
    <button class="breathe-btn" id="breatheToggle">开始 4-4 呼吸</button>
  </div>

  <!-- Quote -->
  <div class="card">
    <div class="quote-box" id="quoteBox">
      <div class="quote-text">每个人都有自己的节奏，不需要和别人比</div>
    </div>
  </div>

  <!-- Mood tracker -->
  <div class="card">
    <div class="card-title"><span class="icon">💫</span> 现在感觉怎么样？</div>
    <div class="mood-grid" id="moodGrid">
      <button class="mood-btn" data-mood="😊">😊</button>
      <button class="mood-btn" data-mood="😌">😌</button>
      <button class="mood-btn" data-mood="😐">😐</button>
      <button class="mood-btn" data-mood="😵">😵</button>
      <button class="mood-btn" data-mood="😴">😴</button>
    </div>
  </div>

</div>

<footer>
  用 💜 构建 · <a href="https://github.com/Aprilssky/adhd" target="_blank">GitHub</a>
  <br><span style="color: var(--text-muted); font-size: 12px;">赞助人：王女士，郭先生</span>
</footer>

<script>
// ── Quotes ──
const QUOTES = [
  '每个人都有自己的节奏，不需要和别人比',
  '完成比完美更重要',
  '你不需要一直高效，你只需要开始',
  '做一点，比什么都不做好',
  '分心不是失败，是大脑在寻找刺激',
  '允许自己慢慢来',
  '混乱也可以是一种秩序',
  '你今天能起床就很棒了',
  '注意力像肌肉，越练越强',
  '小步前进，也是前进',
  '你的大脑只是运作方式不同，不是坏掉了',
  '不需要一直在线，离线也很好',
];

// ── LocalStorage helpers ──
function lsGet(k, def) {
  try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; }
  catch { return def; }
}
function lsSet(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

// ── Show save hint ──
function showHint(el) {
  el.classList.add('show');
  clearTimeout(el._hintTimer);
  el._hintTimer = setTimeout(() => el.classList.remove('show'), 1500);
}

// ── init ──
function init() {
  initPomodoro();
  initTodo();
  initNote();
  initBreathe();
  initMood();
  initQuote();
}
document.addEventListener('DOMContentLoaded', init);

// ══════════════════════════════════════
// POMODORO
// ══════════════════════════════════════
function initPomodoro() {
  const display = document.getElementById('pomodoroDisplay');
  const phase = document.getElementById('pomodoroPhase');
  const toggle = document.getElementById('pomodoroToggle');
  const reset = document.getElementById('pomodoroReset');

  const WORK = 25 * 60, BREAK = 5 * 60;
  let time = WORK, running = false, phaseType = 'work', timer = null;

  function format(t) {
    const m = String(Math.floor(t / 60)).padStart(2, '0');
    const s = String(t % 60).padStart(2, '0');
    return `${m}:${s}`;
  }

  function updateDisplay() {
    display.textContent = format(time);
    phase.textContent = phaseType === 'work' ? '🧠 专注时间' : '☕ 休息一下';
    display.style.color = phaseType === 'work' ? 'var(--primary-dark)' : 'var(--accent)';
  }

  function tick() {
    if (time > 0) { time--; updateDisplay(); }
    else {
      if (phaseType === 'work') {
        phaseType = 'break';
        time = BREAK;
        toggle.textContent = '继续';
      } else {
        phaseType = 'work';
        time = WORK;
        toggle.textContent = '继续';
      }
      updateDisplay();
    }
  }

  toggle.addEventListener('click', () => {
    if (running) {
      clearInterval(timer); timer = null;
      running = false;
      toggle.textContent = '继续';
      toggle.classList.remove('active');
    } else {
      if (time === 0) {
        phaseType = 'work';
        time = WORK;
      }
      timer = setInterval(tick, 1000);
      running = true;
      toggle.textContent = '暂停';
      toggle.classList.add('active');
    }
  });

  reset.addEventListener('click', () => {
    clearInterval(timer); timer = null;
    running = false;
    phaseType = 'work';
    time = WORK;
    toggle.textContent = '开始';
    toggle.classList.remove('active');
    updateDisplay();
  });

  const saved = lsGet('pomodoro', null);
  if (saved) {
    time = saved.time;
    phaseType = saved.phase;
    updateDisplay();
  }

  setInterval(() => {
    lsSet('pomodoro', { time, phase: phaseType });
  }, 3000);

  updateDisplay();
}

// ══════════════════════════════════════
// TODO
// ══════════════════════════════════════
function initTodo() {
  const list = document.getElementById('todoList');
  const empty = document.getElementById('todoEmpty');
  const input = document.getElementById('todoInput');
  const addBtn = document.getElementById('todoAdd');
  const hint = document.getElementById('todoSaveHint');

  let todos = lsGet('todos', []);

  function render() {
    list.innerHTML = '';
    if (todos.length === 0) {
      list.appendChild(empty);
      return;
    }
    todos.forEach((t, i) => {
      const li = document.createElement('li');
      li.className = 'todo-item';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = t.done;
      cb.addEventListener('change', () => {
        todos[i].done = cb.checked;
        label.classList.toggle('done', cb.checked);
        save();
      });

      const label = document.createElement('label');
      label.textContent = t.text;
      if (t.done) label.classList.add('done');

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '✕';
      del.addEventListener('click', () => {
        todos.splice(i, 1);
        render();
        save();
      });

      li.appendChild(cb);
      li.appendChild(label);
      li.appendChild(del);
      list.appendChild(li);
    });
  }

  function save() {
    lsSet('todos', todos);
    showHint(hint);
  }

  function addTodo() {
    const text = input.value.trim();
    if (!text) return;
    todos.push({ text, done: false });
    input.value = '';
    render();
    save();
  }

  addBtn.addEventListener('click', addTodo);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTodo(); });

  render();
}

// ══════════════════════════════════════
// NOTE
// ══════════════════════════════════════
function initNote() {
  const area = document.getElementById('noteArea');
  const hint = document.getElementById('noteSaveHint');

  area.value = lsGet('note', '');
  let saveTimer;

  area.addEventListener('input', () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      lsSet('note', area.value);
      showHint(hint);
    }, 600);
  });
}

// ══════════════════════════════════════
// BREATHE
// ══════════════════════════════════════
function initBreathe() {
  const circle = document.getElementById('breatheCircle');
  const label = document.getElementById('breatheLabel');
  const btn = document.getElementById('breatheToggle');

  let active = false;
  let interval;

  function breatheCycle() {
    label.textContent = '🌬️ 吸气…';
    circle.className = 'breathe-circle inhale';

    setTimeout(() => {
      label.textContent = '💨 屏气…';
      setTimeout(() => {
        label.textContent = '😮‍💨 呼气…';
        circle.className = 'breathe-circle exhale';
        setTimeout(() => {
          label.textContent = '😌 屏气…';
        }, 4000);
      }, 4000);
    }, 4000);
  }

  function start() {
    active = true;
    btn.textContent = '停止';
    btn.classList.add('active');
    breatheCycle();
    interval = setInterval(breatheCycle, 16000);
  }

  function stop() {
    active = false;
    btn.textContent = '开始 4-4 呼吸';
    btn.classList.remove('active');
    clearInterval(interval);
    circle.className = 'breathe-circle';
    label.textContent = '按上方按钮开始';
  }

  btn.addEventListener('click', () => {
    active ? stop() : start();
  });
}

// ══════════════════════════════════════
// MOOD
// ══════════════════════════════════════
function initMood() {
  const saved = lsGet('mood', null);
  const btns = document.querySelectorAll('.mood-btn');

  btns.forEach(b => {
    if (saved && b.dataset.mood === saved) b.classList.add('active');
    b.addEventListener('click', () => {
      btns.forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      lsSet('mood', b.dataset.mood);
    });
  });
}

// ══════════════════════════════════════
// QUOTE
// ══════════════════════════════════════
function initQuote() {
  const box = document.getElementById('quoteBox');
  let idx = Math.floor(Math.random() * QUOTES.length);

  function showQuote() {
    box.innerHTML = `<div class="quote-text">${QUOTES[idx]}</div>`;
  }

  showQuote();
  setInterval(() => {
    idx = (idx + 1) % QUOTES.length;
    showQuote();
  }, 60 * 1000);
}
</script>
